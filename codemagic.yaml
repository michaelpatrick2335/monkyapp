workflows:
  ios-monky-workflow:
    name: Monky iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      # NOTE: We intentionally DO NOT use the ios_signing block here.
      # That block requires an existing distribution certificate and profile
      # in the Apple account, but this is the first iOS build ever so neither
      # exists yet. Instead, the "Set up code signing" script step below uses
      # codemagic-cli-tools to create the cert + profile from scratch.
      vars:
        APP_ID: com.monkyapp.meditation
        VITE_NATIVE_BUILD: "1"
        VITE_API_BASE_URL: "https://www.monkyapp.com"
      node: 22.11.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web client (native mode)
        script: |
          VITE_NATIVE_BUILD=1 VITE_API_BASE_URL=https://www.monkyapp.com npx tsx script/build.ts
      - name: Add iOS platform (first run only)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          set -e
          keychain initialize

          # Step 1: Generate a fresh RSA private key for the iOS distribution certificate.
          # Apple Developer accounts that have never had an iOS cert need this seeded.
          PRIVATE_KEY_PATH="/tmp/ios_distribution_cert.key"
          if [ ! -f "$PRIVATE_KEY_PATH" ]; then
            echo "Generating private key for distribution certificate..."
            ssh-keygen -t rsa -b 2048 -m PEM -f "$PRIVATE_KEY_PATH" -q -N ""
          fi

          # Step 2: fetch-signing-files with --create + --certificate-key will
          # auto-create BOTH the distribution certificate AND the provisioning
          # profile in one shot if either is missing. This is the canonical
          # Codemagic recipe for brand-new Apple accounts.
          echo "Fetching/creating cert + App Store profile for $APP_ID..."
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --certificate-key="$PRIVATE_KEY_PATH" \
            --create

          # Step 3: Add fetched certs + profiles to the keychain & Xcode.
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all ${BUILD_NUMBER:-1}
      - name: Build iOS archive
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Auto-upload to TestFlight so we can install on the iPhone
        submit_to_testflight: true
        # Don't submit to App Store review automatically — flip this true when ready
        submit_to_app_store: false
      email:
        recipients:
          - michaelpatrick2335@gmail.com
        notify:
          success: true
          failure: true
