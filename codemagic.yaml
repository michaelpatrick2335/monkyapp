workflows:
  ios-monky-workflow:
    name: Monky iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.monkyapp.meditation
      vars:
        APP_ID: com.monkyapp.meditation
        VITE_NATIVE_BUILD: "1"
        VITE_API_BASE_URL: "https://www.monkyapp.com"
      node: 22.11.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web client (native mode)
        script: |
          VITE_NATIVE_BUILD=1 VITE_API_BASE_URL=https://www.monkyapp.com npx tsx script/build.ts
      - name: Add iOS platform (first run only)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          # Auto-create distribution certificate if none exists in the account
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save || echo "Cert may already exist, continuing"
          # Fetch (and create if missing) the App Store provisioning profile for our bundle id
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          # Use CM_BUILD_NUMBER which Codemagic auto-increments per build
          agvtool new-version -all ${BUILD_NUMBER:-1}
      - name: Build iOS archive
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Auto-upload to TestFlight (lets you install on your iPhone)
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        # Set to true once we're ready to submit for App Store review
        submit_to_app_store: false
      email:
        recipients:
          - michaelpatrick2335@gmail.com
        notify:
          success: true
          failure: true
