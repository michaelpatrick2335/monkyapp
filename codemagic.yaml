workflows:
  ios-monky-workflow:
    name: Monky iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      # NOTE: We do NOT use the ios_signing block here. That block expects
      # the App Store Connect integration to have profiles already attached
      # to it in Codemagic's Team settings, which they aren't. Instead, the
      # "Set up code signing" script step below uses fetch-signing-files
      # (WITHOUT --create) to download the existing cert + profile that
      # Build #10 already registered in Apple Developer Portal.
      vars:
        APP_ID: com.monkyapp.meditation
        VITE_NATIVE_BUILD: "1"
        VITE_API_BASE_URL: "https://www.monkyapp.com"
        # Set VITE_REVENUECAT_IOS_KEY in the Codemagic UI under Environment
        # variables (do not commit the key here). Required for In-App Purchase.
        # VITE_REVENUECAT_IOS_KEY: "appl_xxxxxxxxxxxxxxxxxxxxx"
      node: 22.11.0
      xcode: latest
      # Capacitor 8 uses Swift Package Manager, not CocoaPods — no cocoapods env needed
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web client (native mode)
        script: |
          VITE_NATIVE_BUILD=1 \
          VITE_API_BASE_URL=https://www.monkyapp.com \
          VITE_REVENUECAT_IOS_KEY="$VITE_REVENUECAT_IOS_KEY" \
            npx tsx script/build.ts
      - name: Add iOS platform (creates Xcode project if missing)
        script: |
          set -e
          # The committed ios/ dir only contains icon assets (no Xcode project),
          # so we always run `cap add ios` when App.xcodeproj is missing.
          # First, stash any committed assets (icons) so they survive the regen.
          if [ -d "ios/App/App/Assets.xcassets" ] && [ ! -d "ios/App/App.xcodeproj" ]; then
            echo "Existing ios/ has assets but no Xcode project — stashing assets and regenerating."
            cp -R ios/App/App/Assets.xcassets /tmp/Assets.xcassets
            rm -rf ios
          fi
          if [ ! -f "ios/App/App.xcodeproj/project.pbxproj" ]; then
            # Explicitly request SPM — Capacitor 8 still requires this flag to skip
            # the CocoaPods scaffold. Without it, cap sync will try `pod install`.
            npx cap add ios --packagemanager SPM
          fi
          # Restore icon assets into the freshly-generated Xcode project.
          if [ -d "/tmp/Assets.xcassets" ]; then
            cp -R /tmp/Assets.xcassets/. ios/App/App/Assets.xcassets/
            rm -rf /tmp/Assets.xcassets
          fi
      - name: Sync Capacitor iOS
        script: |
          set -e
          # `--deployment` is NOT used for SPM projects; cap sync auto-detects SPM
          # when there is no Podfile present. Capacitor 8 generates SPM-based
          # projects by default.
          npx cap sync ios
          # Capacitor 8 uses Swift Package Manager (SPM) instead of CocoaPods,
          # so there is no Podfile and no App.xcworkspace. The build uses
          # App.xcodeproj directly. Verify it exists:
          ls -la ios/App/App.xcodeproj || (echo "App.xcodeproj not created!" && exit 1)
          # If a Podfile somehow got generated (e.g. older Capacitor template),
          # remove it so cap sync stops trying to run pod install on subsequent runs.
          if [ -f "ios/App/Podfile" ]; then
            echo "Removing stray Podfile to force SPM mode."
            rm -f ios/App/Podfile ios/App/Podfile.lock
            rm -rf ios/App/Pods ios/App/App.xcworkspace
          fi
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          set -e
          keychain initialize

          # Build #10's orphaned Distribution certificate has been revoked
          # in Apple Developer Portal (its private key was on an ephemeral
          # build VM and is lost forever). With the slot freed, we can now
          # create a fresh cert + profile from scratch this build.
          #
          # Generate a fresh RSA private key for the iOS distribution certificate.
          PRIVATE_KEY_PATH="/tmp/ios_distribution_cert.key"
          if [ ! -f "$PRIVATE_KEY_PATH" ]; then
            echo "Generating private key for distribution certificate..."
            ssh-keygen -t rsa -b 2048 -m PEM -f "$PRIVATE_KEY_PATH" -q -N ""
          fi
          ls -la "$PRIVATE_KEY_PATH"

          # fetch-signing-files with --create + --certificate-key will
          # auto-create BOTH the distribution certificate AND the provisioning
          # profile in one shot if either is missing.
          echo "Fetching/creating cert + App Store profile for $APP_ID..."
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$PRIVATE_KEY_PATH" \
            --create

          # Add fetched certs + profiles to the keychain & Xcode.
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all ${BUILD_NUMBER:-1}
      - name: Build iOS archive
        script: |
          # Capacitor 8 uses SPM not CocoaPods, so we point at the .xcodeproj
          # directly (no .xcworkspace exists). Absolute path via \$CM_BUILD_DIR.
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme App
    artifacts:
      # xcode-project build-ipa writes to $CM_BUILD_DIR/build/ios/ipa/App.ipa
      # NOT to ios/App/build/. The Publishing step uses these globs to find
      # the IPA to upload to App Store Connect — a wrong path means
      # "Skip publishing to App Store Connect: no IPAs or PKGs found".
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        # Auto-upload to TestFlight so we can install on the iPhone
        submit_to_testflight: true
        # Don't submit to App Store review automatically — flip this true when ready
        submit_to_app_store: false
      email:
        recipients:
          - michaelpatrick2335@gmail.com
        notify:
          success: true
          failure: true
