<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Inter',sans-serif;background:#000}
  .canvas{width:1320px;height:2868px;background:linear-gradient(180deg,#0a1820 0%,#0d0f1a 60%,#000 100%);position:relative;overflow:hidden}
  .leaves-tl{position:absolute;top:-80px;left:-120px;width:520px;height:520px;background:radial-gradient(ellipse 400px 350px at 60% 60%,#1a3d2a 0%,transparent 70%);opacity:0.7}
  .leaves-tr{position:absolute;top:-100px;right:-140px;width:520px;height:520px;background:radial-gradient(ellipse 380px 360px at 40% 60%,#1a3d2a 0%,transparent 70%);opacity:0.7}
  .firefly{position:absolute;border-radius:50%;background:#f5c842;box-shadow:0 0 12px 4px rgba(245,200,66,0.6)}
  .marketing{position:absolute;top:140px;left:0;right:0;text-align:center;padding:0 80px;z-index:5}
  .marketing .eyebrow{color:#f5c842;font-size:36px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px;opacity:0.9}
  .marketing .headline{color:#fff;font-size:148px;font-weight:900;letter-spacing:-0.04em;line-height:0.95;margin-bottom:24px}
  .marketing .headline em{color:#f5c842;font-style:normal}
  .marketing .sub{color:rgba(255,255,255,0.7);font-size:46px;font-weight:500;line-height:1.3;letter-spacing:-0.01em}
  .phone{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:880px;height:1800px;background:#000;border-radius:120px;border:14px solid #1a1a1f;box-shadow:0 80px 200px rgba(0,0,0,0.8),0 0 0 1px rgba(245,200,66,0.15);overflow:hidden}
  .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:220px;height:50px;background:#000;border-radius:30px;z-index:10}
  .screen{position:absolute;inset:0;overflow:hidden;border-radius:108px;background:#0a1820 url('jungle_splash.jpg') center/cover no-repeat}
</style></head>
<body>
<div class="canvas">
  <div class="leaves-tl"></div>
  <div class="leaves-tr"></div>
  <div class="firefly" style="top:180px;left:180px;width:8px;height:8px"></div>
  <div class="firefly" style="top:280px;right:220px;width:10px;height:10px"></div>
  <div class="firefly" style="top:420px;left:120px;width:6px;height:6px"></div>
  <div class="firefly" style="bottom:400px;right:160px;width:8px;height:8px"></div>
  <div class="firefly" style="bottom:600px;left:80px;width:10px;height:10px"></div>

  <div class="marketing">
    <div class="eyebrow">A meditation app for humans</div>
    <h1 class="headline">Breathe in.<br/><em>Level up.</em></h1>
    <p class="sub">Build a meditation habit that<br/>actually sticks. 1,000 levels deep.</p>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen"></div>
  </div>
</div>
</body></html>
