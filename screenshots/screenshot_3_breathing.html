<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Inter',sans-serif;background:#000}
  .canvas{width:1320px;height:2868px;background:linear-gradient(180deg,#0a1820 0%,#0d0f1a 60%,#000 100%);position:relative;overflow:hidden}
  .leaves-tl{position:absolute;top:-80px;left:-120px;width:480px;height:480px;background:radial-gradient(ellipse 380px 320px at 60% 60%,#1a3d2a 0%,transparent 70%);opacity:0.6}
  .leaves-tr{position:absolute;top:-100px;right:-140px;width:480px;height:480px;background:radial-gradient(ellipse 360px 340px at 40% 60%,#1a3d2a 0%,transparent 70%);opacity:0.6}
  .marketing{position:absolute;top:140px;left:0;right:0;text-align:center;padding:0 80px;z-index:5}
  .marketing .eyebrow{color:#f5c842;font-size:36px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px}
  .marketing .headline{color:#fff;font-size:132px;font-weight:900;letter-spacing:-0.04em;line-height:1;margin-bottom:24px}
  .marketing .headline em{color:#f5c842;font-style:normal}
  .marketing .sub{color:rgba(255,255,255,0.7);font-size:42px;font-weight:500;line-height:1.3}
  .phone{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:880px;height:1800px;background:#000;border-radius:120px;border:14px solid #1a1a1f;box-shadow:0 80px 200px rgba(0,0,0,0.8);overflow:hidden}
  .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:220px;height:50px;background:#000;border-radius:30px;z-index:10}
  .screen{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#152535 0%,#0a1820 70%,#000 100%);overflow:hidden;border-radius:108px;padding:120px 50px 50px;display:flex;flex-direction:column;align-items:center}

  .status{display:flex;justify-content:space-between;width:100%;color:#fff;font-size:24px;font-weight:600;margin-bottom:60px;padding:0 20px}

  .session-title{color:rgba(255,255,255,0.55);font-size:26px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
  .session-name{color:#fff;font-size:54px;font-weight:800;letter-spacing:-0.02em;margin-bottom:60px}

  .breath-container{position:relative;width:560px;height:560px;display:flex;align-items:center;justify-content:center;margin-bottom:50px}
  .breath-ring-outer{position:absolute;inset:0;border:3px solid rgba(245,200,66,0.15);border-radius:50%}
  .breath-ring-mid{position:absolute;inset:60px;border:3px solid rgba(245,200,66,0.25);border-radius:50%}
  .breath-circle{width:440px;height:440px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(245,200,66,0.4) 0%,rgba(245,158,11,0.25) 40%,rgba(245,200,66,0.05) 70%,transparent 100%);border:4px solid rgba(245,200,66,0.6);box-shadow:0 0 80px 20px rgba(245,200,66,0.3),inset 0 0 60px rgba(245,200,66,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .breath-circle .action{color:#fff;font-size:88px;font-weight:800;letter-spacing:-0.04em;margin-bottom:4px}
  .breath-circle .count{color:#f5c842;font-size:148px;font-weight:900;letter-spacing:-0.06em;line-height:1}

  .timer-row{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.12);border-radius:100px;padding:18px 42px;margin-bottom:32px}
  .timer-row .icon{width:36px;height:36px;border-radius:50%;border:3px solid #f5c842}
  .timer-row .time{color:#fff;font-size:40px;font-weight:700;letter-spacing:0.02em;font-variant-numeric:tabular-nums}

  .pattern{color:rgba(255,255,255,0.5);font-size:24px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:auto}

  .controls{display:flex;gap:24px;margin-top:40px}
  .ctrl{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px}
  .ctrl.primary{width:120px;height:120px;background:linear-gradient(135deg,#f5c842,#e8952a);color:#0d0f1a;box-shadow:0 10px 30px rgba(245,200,66,0.3)}
</style></head>
<body>
<div class="canvas">
  <div class="leaves-tl"></div>
  <div class="leaves-tr"></div>

  <div class="marketing">
    <div class="eyebrow">Guided breathwork</div>
    <h1 class="headline">Just <em>breathe.</em></h1>
    <p class="sub">Box, 4-7-8, coherent — pick a pattern<br/>and follow the circle. That's it.</p>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span>• • •</span>
      </div>

      <div class="session-title">Breathing Challenge</div>
      <div class="session-name">Box Breathing</div>

      <div class="breath-container">
        <div class="breath-ring-outer"></div>
        <div class="breath-ring-mid"></div>
        <div class="breath-circle">
          <div class="action">Inhale</div>
          <div class="count">4</div>
        </div>
      </div>

      <div class="timer-row">
        <div class="icon"></div>
        <div class="time">02:14</div>
      </div>

      <div class="pattern">4 · 4 · 4 · 4</div>

      <div class="controls">
        <div class="ctrl">⏮</div>
        <div class="ctrl primary">⏸</div>
        <div class="ctrl">⏭</div>
      </div>
    </div>
  </div>
</div>
</body></html>
