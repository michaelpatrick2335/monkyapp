<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Inter',sans-serif;background:#000}
  .canvas{width:1320px;height:2868px;background:linear-gradient(180deg,#0a1820 0%,#0d0f1a 60%,#000 100%);position:relative;overflow:hidden}
  .leaves-tl{position:absolute;top:-80px;left:-120px;width:480px;height:480px;background:radial-gradient(ellipse 380px 320px at 60% 60%,#1a3d2a 0%,transparent 70%);opacity:0.6}
  .leaves-tr{position:absolute;top:-100px;right:-140px;width:480px;height:480px;background:radial-gradient(ellipse 360px 340px at 40% 60%,#1a3d2a 0%,transparent 70%);opacity:0.6}
  .marketing{position:absolute;top:140px;left:0;right:0;text-align:center;padding:0 80px;z-index:5}
  .marketing .eyebrow{color:#f5c842;font-size:36px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px}
  .marketing .headline{color:#fff;font-size:132px;font-weight:900;letter-spacing:-0.04em;line-height:1;margin-bottom:24px}
  .marketing .headline em{color:#f5c842;font-style:normal}
  .marketing .sub{color:rgba(255,255,255,0.7);font-size:42px;font-weight:500;line-height:1.3}
  .phone{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:880px;height:1800px;background:#000;border-radius:120px;border:14px solid #1a1a1f;box-shadow:0 80px 200px rgba(0,0,0,0.8);overflow:hidden}
  .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:220px;height:50px;background:#000;border-radius:30px;z-index:10}
  .screen{position:absolute;inset:0;background:linear-gradient(180deg,#0d0f1a 0%,#0a1820 100%);overflow:hidden;border-radius:108px;padding:120px 50px 50px}

  .status{display:flex;justify-content:space-between;color:#fff;font-size:24px;font-weight:600;margin-bottom:36px;padding:0 20px}

  .header{text-align:center;margin-bottom:40px}
  .header .title{color:#fff;font-size:54px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px}
  .header .sub{color:rgba(255,255,255,0.55);font-size:26px;font-weight:500}

  .streak-hero{position:relative;text-align:center;margin-bottom:44px;padding:48px 24px;background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(232,149,42,0.04));border:1px solid rgba(245,200,66,0.25);border-radius:32px;overflow:hidden}
  .streak-hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(245,200,66,0.3) 0%,transparent 60%);filter:blur(30px)}
  .streak-hero .flame{position:relative;font-size:80px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(245,158,11,0.6))}
  .streak-hero .num{position:relative;color:#f5c842;font-size:200px;font-weight:900;letter-spacing:-0.05em;line-height:1;text-shadow:0 0 40px rgba(245,200,66,0.4);margin-bottom:4px}
  .streak-hero .lbl{position:relative;color:#fff;font-size:32px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}

  .calendar{margin-bottom:32px}
  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .cal-header .month{color:#fff;font-size:28px;font-weight:700}
  .cal-header .nav{color:rgba(255,255,255,0.5);font-size:22px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .day{aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:22px;font-weight:500;background:rgba(255,255,255,0.03)}
  .day.done{background:rgba(245,200,66,0.2);border:1px solid rgba(245,200,66,0.4);color:#f5c842;font-weight:700;box-shadow:0 0 16px rgba(245,200,66,0.15)}
  .day.today{background:linear-gradient(135deg,#f5c842,#e8952a);color:#0d0f1a;font-weight:800}

  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px}
  .stat{background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.1);border-radius:20px;padding:22px 20px}
  .stat .v{color:#f5c842;font-size:44px;font-weight:800;letter-spacing:-0.02em;line-height:1;margin-bottom:6px}
  .stat .k{color:rgba(255,255,255,0.55);font-size:18px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
</style></head>
<body>
<div class="canvas">
  <div class="leaves-tl"></div>
  <div class="leaves-tr"></div>

  <div class="marketing">
    <div class="eyebrow">Habits, not hustle</div>
    <h1 class="headline">Show up<br/><em>daily.</em></h1>
    <p class="sub">A streak counter that celebrates<br/>consistency, never shames a miss.</p>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span>• • •</span>
      </div>

      <div class="header">
        <div class="title">Your Streak</div>
        <div class="sub">Personal best · 31 days</div>
      </div>

      <div class="streak-hero">
        <div class="flame">🔥</div>
        <div class="num">28</div>
        <div class="lbl">Days in a row</div>
      </div>

      <div class="calendar">
        <div class="cal-header">
          <div class="month">June 2026</div>
          <div class="nav">‹ ›</div>
        </div>
        <div class="cal-grid">
          <div class="day">M</div><div class="day">T</div><div class="day">W</div><div class="day">T</div><div class="day">F</div><div class="day">S</div><div class="day">S</div>
          <div class="day done">1</div><div class="day done">2</div><div class="day done">3</div><div class="day done">4</div><div class="day done">5</div><div class="day done">6</div><div class="day done">7</div>
          <div class="day done">8</div><div class="day done">9</div><div class="day done">10</div><div class="day done">11</div><div class="day done">12</div><div class="day today">13</div><div class="day">14</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div class="v">127</div><div class="k">Total sessions</div></div>
        <div class="stat"><div class="v">43h</div><div class="k">Meditated</div></div>
      </div>
    </div>
  </div>
</div>
</body></html>
